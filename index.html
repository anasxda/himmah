  function t(){ return STRINGS[state.lang]; }

  document.documentElement.setAttribute("lang", "ar");

  var state = loadState() || createDefaultState();
  var focusNewExerciseId = null;

  function createDefaultState(){
    var types = ["push","pull","legs","push","pull","legs","rest"];
    return {
      theme: null,
      lang: "ar",
      activeDay: 0,
      days: types.map(function(ty){ return { type:ty, completed:false, exercises:[] }; })
    };
  }
  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      var parsed = JSON.parse(raw);
      if(!parsed || !Array.isArray(parsed.days) || parsed.days.length !== 7) return null;
      if(!parsed.lang) parsed.lang = "ar";
      return parsed;
    }catch(e){ return null; }
  }
  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }
  function uid(){ return "e" + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function eastern(n){ return String(n).split("").map(function(d){ return EASTERN_DIGITS[+d] || d; }).join(""); }
  function digits(n){ return state.lang === "ar" ? eastern(n) : String(n); }
  function escapeHtml(str){
    return String(str == null ? "" : str).replace(/[&<>"']/g, function(c){
      return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[c];
    });
  }
  function fmtNum(n){ return (Math.round(n * 100) / 100).toString(); }

  function suggestNextWeight(ex){
    var reps = parseFloat(ex.reps);
    var weight = parseFloat(ex.weight);
    if(isNaN(reps) || isNaN(weight) || reps <= 0 || weight <= 0) return null;
    var isKg = ex.unit !== "lb";
    var big = isKg ? 2.5 : 5;
    var small = isKg ? 1.25 : 2.5;
    var next, note;
    if(reps >= 12){ next = weight + big; note = t().coachStrong; }
    else if(reps >= 8){ next = weight + small; note = t().coachSteady; }
    else { next = weight; note = t().coachHold; }
    next = Math.round(next * 4) / 4;
    return { next: next, note: note, unit: isKg ? t().unitKg : t().unitLb };
  }

  function badgeHTML(ex){
    var r = suggestNextWeight(ex);
    if(!r) return "";
    return '<div class="suggest-badge">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-9"/><path d="M15 6h6v6"/></svg>' +
      '<div class="suggest-badge-text">' +
        '<span class="suggest-badge-value">' + escapeHtml(t().suggestPrefix) + fmtNum(r.next) + " " + escapeHtml(r.unit) + '</span>' +
        '<span class="suggest-badge-note">' + escapeHtml(r.note) + '</span>' +
      '</div></div>';
  }

  var dayRailEl = document.getElementById("dayRail");

  function renderDayRail(){
    var s = t();
    var html = "";
    for(var i=0;i<7;i++){
      var day = state.days[i];
      var cls = "day-pill" + (i===state.activeDay ? " active" : "") + (day.completed ? " done" : "");
      html += '<button type="button" class="'+cls+'" data-role="select-day" data-day="'+i+'" role="tab" aria-selected="'+(i===state.activeDay)+'">' +
        '<span class="pill-index">'+ digits(i+1) +'</span>' +
        '<span class="pill-type">'+ escapeHtml(s.typeLabels[day.type]) +'</span>' +
      '</button>';
    }
    dayRailEl.innerHTML = html;
  }

  function exerciseCardHTML(ex){
    var s = t();
    var suggestions = EXERCISES[state.lang][state.days[state.activeDay].type] || [];
    return '<article class="ex-card" data-ex-id="'+ex.id+'">' +
      '<div class="ex-card-top">' +
        '<div class="ex-name-field">' +
          '<input type="text" class="ex-name-input" data-role="name" placeholder="'+escapeHtml(s.exerciseNamePlaceholder)+'" autocomplete="off" value="'+escapeHtml(ex.name)+'">' +
          '<button type="button" class="ex-suggest-toggle" data-role="suggest-toggle" aria-label="'+escapeHtml(s.suggestAria)+'">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>' +
          '</button>' +
          '<div class="ex-suggest-panel" data-role="suggest-panel" hidden>' + suggestPanelItems(suggestions, ex.name) + '</div>' +
        '</div>' +
        '<button type="button" class="ex-delete" data-role="delete" aria-label="'+escapeHtml(s.deleteAria)+'">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 5l14 14M19 5L5 19"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="ex-grid">' +
        '<label class="ex-field"><span class="ex-field-label">'+escapeHtml(s.fieldSets)+'</span>' +
          '<input type="number" inputmode="numeric" min="0" class="ex-input" data-role="sets" value="'+escapeHtml(ex.sets)+'"></label>' +
        '<label class="ex-field"><span class="ex-field-label">'+escapeHtml(s.fieldReps)+'</span>' +
          '<input type="number" inputmode="numeric" min="0" class="ex-input" data-role="reps" value="'+escapeHtml(ex.reps)+'"></label>' +
        '<label class="ex-field ex-field-weight"><span class="ex-field-label">'+escapeHtml(s.fieldWeight)+'</span>' +
          '<div class="weight-row">' +
            '<input type="number" inputmode="decimal" min="0" step="0.5" class="ex-input" data-role="weight" value="'+escapeHtml(ex.weight)+'">' +
            '<div class="unit-toggle" data-role="unit-toggle">' +
              '<button type="button" data-unit="kg" class="'+(ex.unit==="kg"?"active":"")+'">'+escapeHtml(s.unitKg)+'</button>' +
              '<button type="button" data-unit="lb" class="'+(ex.unit==="lb"?"active":"")+'">'+escapeHtml(s.unitLb)+'</button>' +
            '</div>' +
          '</div></label>' +
      '</div>' +
      '<div class="suggest-holder" data-role="suggest-holder">' + badgeHTML(ex) + '</div>' +
      '<label class="ex-note-field"><span class="ex-field-label">'+escapeHtml(s.fieldNotes)+'</span>' +
        '<textarea class="ex-note" data-role="note" placeholder="'+escapeHtml(s.notePlaceholder)+'" rows="1">'+escapeHtml(ex.note)+'</textarea></label>' +
    '</article>';
  }

  function suggestPanelItems(list, currentValue){
    var s = t();
    var q = (currentValue || "").trim().toLowerCase();
    var filtered = q ? list.filter(function(name){ return name.toLowerCase().indexOf(q) !== -1; }) : list;
    if(filtered.length === 0) return '<div class="ex-suggest-empty">'+escapeHtml(s.noSuggestions)+'</div>';
    return filtered.map(function(name){
      return '<button type="button" class="ex-suggest-item" data-role="suggest-item" data-value="'+escapeHtml(name)+'">'+escapeHtml(name)+'</button>';
    }).join("");
  }

    return '<div class="empty-day">' +

      '<p>'+ t().emptyText +'</p>' +
    '</div>';

  function renderDayContent(){
    var s = t();

    var html = '<div class="day-title-row">' +

      '</button>' +
    '</div>';

    if(isRest){
      html += '<div class="rest-hint">'+escapeHtml(s.restHint)+'</div>';

    html += '<div class="ex-list" id="exList">';
    if(day.exercises.length === 0){
      html += emptyDayHTML();
    } else {
      html += day.exercises.map(exerciseCardHTML).join("");
    }
    html += '</div>';

    html += '<button type="button" class="btn-add-exercise" data-role="add-exercise">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>' +
      escapeHtml(s.addExercise) +
    '</button>';

    html += '<p class="app-footer" dir="ltr">© ' + new Date().getFullYear() + ' Anas Althubyani. All rights reserved.</p>';

    html += '<div style="height:76px"></div>';

    html += '<div class="bottom-bar">';
    if(day.completed){
      html += '<div class="day-complete-summary">' +
        '<span class="check-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg></span>' +

        '<button type="button" class="btn-link" data-role="reopen-day">'+escapeHtml(s.editLink)+'</button>' +

      html += '<button type="button" class="btn-complete" data-role="complete-day">'+escapeHtml(s.completeDay)+'</button>';

    autoGrowAll();

      var el = dayContentEl.querySelector('[data-ex-id="'+focusNewExerciseId+'"] [data-role="name"]');
      if(el){ el.focus(); }
      focusNewExerciseId = null;
    }

  function autoGrowAll(){
    var areas = dayContentEl.querySelectorAll(".ex-note");
    areas.forEach(function(a){ a.style.height = "auto"; a.style.height = a.scrollHeight + "px"; });
  }

  function findExercise(exId){
    var day = state.days[state.activeDay];
    for(var i=0;i<day.exercises.length;i++){
      if(day.exercises[i].id === exId) return day.exercises[i];
    }
    return null;
  }

  function closeAllSuggestPanels(except){
    dayContentEl.querySelectorAll('[data-role="suggest-panel"]').forEach(function(p){
      if(p !== except) p.hidden = true;
    });
  }

  // ---- Event delegation ----
  dayContentEl.addEventListener("click", function(e){
    var addBtn = e.target.closest('[data-role="add-exercise"]');
    if(addBtn){
      var newEx = { id: uid(), name:"", sets:"", reps:"", weight:"", unit:"kg", note:"" };
      state.days[state.activeDay].exercises.push(newEx);
      focusNewExerciseId = newEx.id;
      saveState();
      renderDayContent();
      return;
    }

    var delBtn = e.target.closest('[data-role="delete"]');
    if(delBtn){
      var card = delBtn.closest(".ex-card");
      var exId = card.getAttribute("data-ex-id");
      var day = state.days[state.activeDay];
      day.exercises = day.exercises.filter(function(x){ return x.id !== exId; });
      saveState();
      renderDayContent();
      return;
    }

    var cycleBtn = e.target.closest('[data-role="cycle-type"]');
    if(cycleBtn){
      var d = state.days[state.activeDay];
      var order = TYPE_ORDER;
      d.type = order[(order.indexOf(d.type) + 1) % order.length];
      saveState();
      renderDayContent();
      return;
    }

    var completeBtn = e.target.closest('[data-role="complete-day"]');
    if(completeBtn){
      state.days[state.activeDay].completed = true;
      saveState();
      renderDayContent();
      renderDayRail();
      showCelebration();
      return;
    }

    var reopenBtn = e.target.closest('[data-role="reopen-day"]');
    if(reopenBtn){
      state.days[state.activeDay].completed = false;
      saveState();
      renderDayContent();
      renderDayRail();
      return;
    }

    var suggestToggle = e.target.closest('[data-role="suggest-toggle"]');
    if(suggestToggle){
      var panel = suggestToggle.parentElement.querySelector('[data-role="suggest-panel"]');
      var willOpen = panel.hidden;
      closeAllSuggestPanels();
      panel.hidden = !willOpen;
      return;
    }

    var suggestItem = e.target.closest('[data-role="suggest-item"]');
    if(suggestItem){
      var itemCard = suggestItem.closest(".ex-card");
      var input = itemCard.querySelector('[data-role="name"]');
      var value = suggestItem.getAttribute("data-value");
      input.value = value;
      var ex = findExercise(itemCard.getAttribute("data-ex-id"));
      if(ex) ex.name = value;
      saveState();
      itemCard.querySelector('[data-role="suggest-panel"]').hidden = true;
      return;
    }

    var unitBtn = e.target.closest("[data-unit]");
    if(unitBtn){
      var unitCard = unitBtn.closest(".ex-card");
      var uex = findExercise(unitCard.getAttribute("data-ex-id"));
      if(uex){
        uex.unit = unitBtn.getAttribute("data-unit");
        unitCard.querySelectorAll("[data-unit]").forEach(function(b){ b.classList.toggle("active", b === unitBtn); });
        unitCard.querySelector('[data-role="suggest-holder"]').innerHTML = badgeHTML(uex);
        saveState();
      }
      return;
    }
  });

  dayContentEl.addEventListener("focusin", function(e){
    if(e.target.matches('[data-role="name"]')){
      var card = e.target.closest(".ex-card");
      var panel = card.querySelector('[data-role="suggest-panel"]');
      var suggestions = EXERCISES[state.lang][state.days[state.activeDay].type] || [];
      panel.innerHTML = suggestPanelItems(suggestions, e.target.value);
      closeAllSuggestPanels(panel);
      panel.hidden = false;
    }
  });

  dayContentEl.addEventListener("focusout", function(e){
    if(e.target.matches('[data-role="name"]')){
      var card = e.target.closest(".ex-card");
      setTimeout(function(){
        var panel = card.querySelector('[data-role="suggest-panel"]');
        if(panel) panel.hidden = true;
      }, 150);
    }
  });

  dayContentEl.addEventListener("input", function(e){
    var role = e.target.getAttribute("data-role");
    if(!role) return;
    var card = e.target.closest(".ex-card");
    if(!card) return;
    var ex = findExercise(card.getAttribute("data-ex-id"));
    if(!ex) return;

    if(role === "name"){
      ex.name = e.target.value;
      var panel = card.querySelector('[data-role="suggest-panel"]');
      var suggestions = EXERCISES[state.lang][state.days[state.activeDay].type] || [];
      panel.innerHTML = suggestPanelItems(suggestions, e.target.value);
      panel.hidden = false;
    } else if(role === "sets"){
      ex.sets = e.target.value;
    } else if(role === "reps"){
      ex.reps = e.target.value;
      card.querySelector('[data-role="suggest-holder"]').innerHTML = badgeHTML(ex);
    } else if(role === "weight"){
      ex.weight = e.target.value;
      card.querySelector('[data-role="suggest-holder"]').innerHTML = badgeHTML(ex);
    } else if(role === "note"){
      ex.note = e.target.value;
      e.target.style.height = "auto";
      e.target.style.height = e.target.scrollHeight + "px";
    }
    saveState();
  });

  dayRailEl.addEventListener("click", function(e){
    var btn = e.target.closest('[data-role="select-day"]');
    if(!btn) return;
    state.activeDay = parseInt(btn.getAttribute("data-day"), 10);
    saveState();
    renderDayRail();
    renderDayContent();
  });

  // ---- Theme ----
  function effectiveTheme(){
    if(state.theme) return state.theme;
    return (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  }
  function applyTheme(){
    if(state.theme){ document.documentElement.setAttribute("data-theme", state.theme); }
    else { document.documentElement.removeAttribute("data-theme"); }
  }
  themeToggleBtn.addEventListener("click", function(){
    state.theme = effectiveTheme() === "dark" ? "light" : "dark";
    saveState();
    applyTheme();
  });

  // ---- Language ----
  langToggleBtn.addEventListener("click", function(){
    state.lang = state.lang === "ar" ? "en" : "ar";
    saveState();
    renderChrome();
    renderDayRail();
    renderDayContent();
  });

  // ---- Celebration modal ----
  function showCelebration(){
    var list = MOTIVATION[state.lang];
    var phrase = list[Math.floor(Math.random() * list.length)];
    modalPhraseEl.textContent = phrase;
    overlayEl.hidden = false;
  }
  function hideCelebration(){ overlayEl.hidden = true; }
  modalCloseBtn.addEventListener("click", hideCelebration);
  overlayEl.addEventListener("click", function(e){ if(e.target === overlayEl) hideCelebration(); });

  // ---- Clear data ----
  function openClearConfirm(){ clearOverlayEl.hidden = false; }
  function closeClearConfirm(){ clearOverlayEl.hidden = true; }
  clearDataBtn.addEventListener("click", openClearConfirm);
  clearCancelBtn.addEventListener("click", closeClearConfirm);
  clearOverlayEl.addEventListener("click", function(e){ if(e.target === clearOverlayEl) closeClearConfirm(); });
  clearConfirmBtn.addEventListener("click", function(){
    var keepTheme = state.theme;
    var keepLang = state.lang;
    state = createDefaultState();
    state.theme = keepTheme;
    state.lang = keepLang;
    saveState();
    closeClearConfirm();
    renderDayRail();
    renderDayContent();
  });

  document.addEventListener("keydown", function(e){
    if(e.key !== "Escape") return;
    if(!overlayEl.hidden) hideCelebration();
    if(!clearOverlayEl.hidden) closeClearConfirm();
    if(!timerOverlayEl.hidden) timerOverlayEl.hidden = true;
  });

  // ---- Date/time strip ----
  function updateDateTimeStrip(){
    var s = t();
    var opts = { weekday:"long", day:"numeric", month:"long", hour:"2-digit", minute:"2-digit" };
    var str;
    try{ str = new Intl.DateTimeFormat(s.locale, opts).format(new Date()); }
    catch(e){ str = new Date().toLocaleString(); }
    dateTimeStripEl.textContent = str;
  }

  // ---- Rest timer ----
  var timerState = { total:90, remaining:90, running:false, intervalId:null };

  function fmtClock(totalSeconds){
    var m = Math.floor(totalSeconds / 60);
    var sec = totalSeconds % 60;
    var str = (m < 10 ? "0"+m : ""+m) + ":" + (sec < 10 ? "0"+sec : ""+sec);
    if(state.lang === "ar"){
      str = str.split("").map(function(ch){ return /[0-9]/.test(ch) ? EASTERN_DIGITS[+ch] : ch; }).join("");
    }
    return str;
  }
  function renderTimerToggleLabel(){
    timerToggleBtn.textContent = timerState.running ? t().timerPause : t().timerStart;
  }
  function updateTimerDisplay(){
    timerDisplayEl.textContent = fmtClock(timerState.remaining);
    timerDisplayEl.classList.toggle("done", timerState.remaining === 0);
  }
  function stopTimerInterval(){
    if(timerState.intervalId){ clearInterval(timerState.intervalId); timerState.intervalId = null; }
  }
  function playBeep(){
    try{
      var Ctx = window.AudioContext || window.webkitAudioContext;
      var ctx = new Ctx();
      [0, 0.28, 0.56].forEach(function(offset){
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 880;
        var t0 = ctx.currentTime + offset;
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.35, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
        o.start(t0); o.stop(t0 + 0.24);
      });
    }catch(e){}
  }
  function tickTimer(){
    timerState.remaining -= 1;
    if(timerState.remaining <= 0){
      timerState.remaining = 0;
      stopTimerInterval();
      timerState.running = false;
      renderTimerToggleLabel();
      updateTimerDisplay();
      playBeep();
      if(navigator.vibrate){ try{ navigator.vibrate([200,100,200,100,200]); }catch(e){} }
      return;
    }
    updateTimerDisplay();
  }
  function startTimer(){
    if(timerState.remaining <= 0) return;
    timerState.running = true;
    renderTimerToggleLabel();
    stopTimerInterval();
    timerState.intervalId = setInterval(tickTimer, 1000);
  }
  function pauseTimer(){
    timerState.running = false;
    renderTimerToggleLabel();
    stopTimerInterval();
  }
  function resetTimer(){
    pauseTimer();
    timerState.remaining = timerState.total;
    updateTimerDisplay();
  }
  function setTimerPreset(secs){
    pauseTimer();
    timerState.total = secs;
    timerState.remaining = secs;
    updateTimerDisplay();
    timerPresetsEl.querySelectorAll(".timer-preset").forEach(function(b){
      b.classList.toggle("active", parseInt(b.getAttribute("data-secs"), 10) === secs);
    });
  }

  timerFabBtn.addEventListener("click", function(){ timerOverlayEl.hidden = false; });
  timerOverlayEl.addEventListener("click", function(e){ if(e.target === timerOverlayEl) timerOverlayEl.hidden = true; });
  timerToggleBtn.addEventListener("click", function(){ if(timerState.running) pauseTimer(); else startTimer(); });
  timerResetBtn.addEventListener("click", resetTimer);
  timerPresetsEl.addEventListener("click", function(e){
    var btn = e.target.closest(".timer-preset");
    if(!btn) return;
    setTimerPreset(parseInt(btn.getAttribute("data-secs"), 10));
  });

  // ---- Splash ----
  function runSplash(){
    var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    function dismiss(){
      splashOverlayEl.classList.add("hide");
      setTimeout(function(){ splashOverlayEl.hidden = true; }, reduceMotion ? 0 : 450);
    }
    splashOverlayEl.addEventListener("click", dismiss, { once:true });
    setTimeout(dismiss, 1800);
  }

  // ---- Init ----
  applyTheme();
  renderChrome();
  renderDayRail();
  renderDayContent();
  updateTimerDisplay();
  runSplash();
  setInterval(updateDateTimeStrip, 1000);
})();
</script>
